<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-2xl mx-auto mt-20 p-8 bg-white rounded-lg shadow-lg">
        <h1 class="text-3xl font-bold text-center mb-8">AI Resume Analyzer 🚀</h1>
        
        <form id="resumeForm" enctype="multipart/form-data" method="POST" action="{% url 'upload_resume' %}">
            {% csrf_token %}
            <input type="file" id="resume" name="resume" accept=".pdf" 
                   class="w-full p-3 border rounded mb-4">
            <button type="submit" 
                    class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700">
                Analyze Resume
            </button>
        </form>
        
        <div id="result" class="mt-6"></div>
    </div>
</body>
</html>
